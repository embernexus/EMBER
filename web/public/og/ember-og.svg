  <circle cx="930" cy="180" r="160" fill="#ff4d0022" />
  <circle cx="1020" cy="420" r="210" fill="#ff6a0018" />
  <circle cx="230" cy="500" r="170" fill="#ff2d5518" />

  <g transform="translate(90 90)">
