    <text x="22" y="40" fill="#fff1e4" font-size="25" font-family="Consolas, Menlo, monospace">EMBR...</text>

    <rect x="276" y="0" width="250" height="62" rx="14" fill="#1a0a10" stroke="#ff5f007f" />
    <text x="298" y="40" fill="#fff1e4" font-size="25" font-family="Consolas, Menlo, monospace">EMBER...</text>

    <rect x="552" y="0" width="285" height="62" rx="14" fill="#1a0a10" stroke="#ff5f007f" />
    <text x="574" y="40" fill="#fff1e4" font-size="25" font-family="Consolas, Menlo, monospace">LIVE LOGS</text>
  </g>
</svg>
