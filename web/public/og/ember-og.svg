<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="EMBER.nexus - Advanced Solana execution bots">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040207" />
      <stop offset="55%" stop-color="#0f040a" />
      <stop offset="100%" stop-color="#190608" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6400" />
      <stop offset="100%" stop-color="#ff2d55" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7f1f6e" />
      <stop offset="100%" stop-color="#ff7f1f00" />
    </radialGradient>
    <radialGradient id="flameOuter" cx="52%" cy="20%" r="86%">
      <stop offset="0%" stop-color="#ff8a2a" />
      <stop offset="60%" stop-color="#ff4f1f" />
      <stop offset="100%" stop-color="#ff2f16" />
    </radialGradient>
    <radialGradient id="flameInner" cx="50%" cy="22%" r="74%">
      <stop offset="0%" stop-color="#fff48a" />
      <stop offset="100%" stop-color="#ffad27" />
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" />
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)" />

  <circle cx="845" cy="170" r="200" fill="url(#glow)" />
  <circle cx="1020" cy="470" r="230" fill="#ff650014" />

  <g transform="translate(522 54)">
    <path d="M78 8c36 52 76 93 76 148 0 52-34 92-76 92s-76-40-76-92c0-55 40-96 76-148z" fill="url(#flameOuter)" filter="url(#softGlow)" />
    <path d="M78 67c24 34 52 62 52 102 0 34-22 60-52 60s-52-26-52-60c0-40 28-68 52-102z" fill="url(#flameInner)" />
  </g>

  <text x="118" y="338" fill="#ffffff" font-size="102" font-weight="800" font-family="Segoe UI, Arial, sans-serif">EMBER</text>
  <text x="544" y="338" fill="#ff9f25" font-size="102" font-weight="800" font-family="Segoe UI, Arial, sans-serif">.</text>
  <text x="582" y="338" fill="#ffffff" font-size="102" font-weight="700" font-family="Segoe UI, Arial, sans-serif">nexus</text>

  <text x="118" y="388" fill="#ffbe8d" font-size="34" font-weight="700" font-family="Segoe UI, Arial, sans-serif">ADVANCED SOLANA EXECUTION BOTS</text>
  <text x="118" y="447" fill="#f2ddd1" font-size="33" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Attach any token. Automate burn and volume flows.</text>
  <text x="118" y="490" fill="#d7beb1" font-size="24" font-family="Segoe UI, Arial, sans-serif">Creator rewards, external deposits, and live on-chain execution logs in one dashboard.</text>

  <g transform="translate(118 526)">
    <rect x="0" y="0" width="190" height="44" rx="11" fill="#13070b" stroke="#ff5f0080" />
    <text x="25" y="29" fill="#ffd9bf" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif">BURN BOT</text>

    <rect x="210" y="0" width="210" height="44" rx="11" fill="#13070b" stroke="#ff5f0080" />
    <text x="235" y="29" fill="#ffd9bf" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif">VOLUME BOT</text>

    <rect x="440" y="0" width="274" height="44" rx="11" fill="#13070b" stroke="#ff5f0080" />
    <text x="465" y="29" fill="#ffd9bf" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif">MARKET MAKER BOT</text>
  </g>
</svg>
